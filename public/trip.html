<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip - WanderAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
<nav class="nav">
  <a href="/dashboard.html" class="nav-brand">✈️ WanderAI</a>
  <div class="nav-right" id="navRight">
    <div id="notifMount"></div>
    <a href="/dashboard.html" class="btn btn-ghost btn-sm">← <span class="btn-label">My trips</span></a>
    <button class="btn btn-ghost btn-sm" id="shareBtn" style="display:none" onclick="openShareModal()">👥 <span class="btn-label">Share</span></button>
    <button class="btn btn-primary btn-sm" onclick="window.print()">🖨 <span class="btn-label">Print</span></button>
  </div>
</nav>

<div id="tripApp">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-hdr">
      <h2 id="tripTitle">Loading…</h2>
      <p id="tripMeta"></p>
      <div id="currencyBar" class="currency-bar"></div>
      <div id="weatherBar" class="weather-bar"></div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="sb-body" id="sbBody">
      <div style="text-align:center;padding:40px 20px">
        <div class="spinner spinner-blue" style="width:32px;height:32px;margin:0 auto 12px;border-width:3px"></div>
        <p style="color:var(--muted);font-size:14px">Loading itinerary…</p>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div id="mapDiv">
    <div id="map"></div>
    <div id="syncToast" class="sync-toast"></div>
    <div class="map-legend">
      <h4>Transport</h4>
      <div class="leg-row"><div class="leg-line" style="background:#EF4444;border-top:2.5px dashed #EF4444;height:0"></div> Flight</div>
      <div class="leg-row"><div class="leg-line" style="background:#10B981"></div> Train</div>
      <div class="leg-row"><div class="leg-line" style="background:#F59E0B;border-top:2.5px dotted #F59E0B;height:0"></div> Car/Bus</div>
      <div class="leg-row"><div class="leg-line" style="background:#6B7280"></div> Other</div>
    </div>
  </div>
</div>

<!-- SHARE / COLLABORATORS MODAL -->
<div id="shareModalOverlay" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 style="margin-bottom:4px">Share this trip</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Invite friends or family to view or edit this itinerary together.</p>
    <div id="collabList" style="margin-bottom:16px"></div>
    <div id="inviteFormWrap" style="display:none;border-top:1px solid var(--border);padding-top:16px">
      <div class="form-group">
        <label class="form-label">Invite by email</label>
        <input type="email" id="inviteEmail" class="form-input" placeholder="friend@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="inviteRole" class="form-input form-select">
          <option value="editor">Editor — can view and modify</option>
          <option value="viewer">Viewer — can view only</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" id="inviteSendBtn" onclick="submitInvite()">Send invite</button>
    </div>
    <button class="btn btn-ghost btn-full" style="margin-top:14px" onclick="closeShareModal()">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/weather.js"></script>
<script src="/js/currency.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = window.SUPABASE_URL || 'https://yaqzlytfwvvcygwxzdhr.supabase.co';
const SUPABASE_ANON = window.SUPABASE_ANON || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhcXpseXRmd3Z2Y3lnd3h6ZGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2Nzc5NzUsImV4cCI6MjA5OTI1Mzk3NX0.lQyAFpD0NbEnDpUkDrIabJ7e1aaO3gA9Kzyxq0MQmCg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let map, markersLayer, routesLayer, tripData;
let activeDay = 'all';
const markersByPlaceId = {};

let tripId = null;
let currentUserId = null;
let myRole = 'viewer';
let saveTimer = null;
let tripPreferences = {};
let baseCurrency = 'USD';    // the currency the itinerary's numbers are actually denominated in
let displayCurrency = 'USD'; // the currency currently shown (converted via currentRate)
let destGuess = 'USD';       // guessed local currency of the destination, for the quick-switch button
let currentRate = 1;
let rateAvailable = true;

const CAT_ICONS = {
  attraction:'🏛️', restaurant:'🍽️', hotel:'🏨', museum:'🎨',
  beach:'🏖️', park:'🌿', market:'🛍️', viewpoint:'👁️',
  transport:'🚉', default:'📍'
};
const TRANSPORT_ICONS = {
  flight:'✈️', train:'🚄', car:'🚗', bus:'🚌', boat:'⛵', walk:'🚶', ferry:'⛴️'
};
const CITY_GRADIENTS = [
  ['#2563EB','#7C3AED'],['#DC2626','#EA580C'],['#059669','#0891B2'],
  ['#7C3AED','#DB2777'],['#D97706','#DC2626'],['#0891B2','#2563EB'],
  ['#1D4ED8','#059669'],['#BE185D','#7C3AED']
];

function dayColor(idx) {
  const [c1] = CITY_GRADIENTS[idx % CITY_GRADIENTS.length];
  return c1;
}

// ---- MAP INIT ----
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB © OSM', subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  map.zoomControl.setPosition('topright');
  markersLayer = L.layerGroup().addTo(map);
  routesLayer = L.layerGroup().addTo(map);
}

function mkIcon(emoji, color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:34px;height:34px;border-radius:50%;background:'+color+';border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;">'+emoji+'</div>',
    iconSize: [34,34], iconAnchor: [17,17]
  });
}

function mkPopup(place, color) {
  const icon = CAT_ICONS[place.category] || CAT_ICONS.default;
  const costText = WanderCurrency.formatCost(place.cost, baseCurrency, rateAvailable ? displayCurrency : baseCurrency, currentRate);
  return '<div><div class="popup-name">'+icon+' '+place.name+'</div>'
    +(place.description?'<div class="popup-desc">'+place.description.substring(0,120)+'…</div>':'')
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'
    +(costText?'<span class="badge badge-blue">'+costText+'</span>':'')
    +(place.duration?'<span class="badge badge-gray">⏱ '+place.duration+'</span>':'')
    +(place.bookingRequired?'<span class="badge badge-amber">🎟 Book required</span>':'')
    +'</div>'
    +(place.bookingUrl?'<a href="'+place.bookingUrl+'" target="_blank" class="popup-book">Book tickets →</a>':'')
    +'</div>';
}

function drawRoutes(days) {
  routesLayer.clearLayers();
  const byDay = {};
  days.forEach((d,i) => byDay[i] = (d.places||[]).filter(p=>p.lat&&p.lng));

  // Draw transport lines between consecutive days
  for (let i = 1; i < days.length; i++) {
    const prev = byDay[i-1]; const curr = byDay[i];
    if (!prev.length || !curr.length) continue;
    const from = [prev[0].lat, prev[0].lng];
    const to = [curr[0].lat, curr[0].lng];
    if (from[0]===to[0] && from[1]===to[1]) continue;
    const t = days[i].transport;
    const mode = t?.mode || 'other';
    const col = mode==='flight'?'#EF4444':mode==='train'?'#10B981':mode==='car'||mode==='bus'?'#F59E0B':'#6B7280';
    const dash = mode==='flight'?'10,8':mode==='car'||mode==='bus'?'4,7':null;
    L.polyline([from,to],{color:col,weight:2.5,opacity:.75,dashArray:dash})
      .addTo(routesLayer)
      .bindTooltip((TRANSPORT_ICONS[mode]||'🚌')+' '+(t?.from||'')+' → '+(t?.to||''),{sticky:true});
  }
}

function showAllMarkers(days) {
  markersLayer.clearLayers();
  const bounds = [];
  days.forEach((day,di) => {
    const col = dayColor(di);
    (day.places||[]).forEach(p => {
      if (!p.lat||!p.lng) return;
      const icon = CAT_ICONS[p.category]||CAT_ICONS.default;
      const m = L.marker([p.lat,p.lng],{icon:mkIcon(icon,col)}).addTo(markersLayer);
      m.bindPopup(mkPopup(p,col),{maxWidth:260});
      m.on('click',()=>highlightCard(p.id));
      markersByPlaceId[p.id] = {marker:m, dayIdx:di};
      bounds.push([p.lat,p.lng]);
    });
  });
  if (bounds.length) map.fitBounds(bounds,{padding:[40,40],maxZoom:13});
}

function showDayMarkers(dayData, di) {
  markersLayer.clearLayers();
  const col = dayColor(di);
  const bounds = [];
  (dayData.places||[]).forEach(p => {
    if (!p.lat||!p.lng) return;
    const icon = CAT_ICONS[p.category]||CAT_ICONS.default;
    const m = L.marker([p.lat,p.lng],{icon:mkIcon(icon,col)}).addTo(markersLayer);
    m.bindPopup(mkPopup(p,col),{maxWidth:260});
    m.on('click',()=>highlightCard(p.id));
    markersByPlaceId[p.id] = {marker:m, dayIdx:di};
    bounds.push([p.lat,p.lng]);
  });
  if (bounds.length) {
    if (bounds.length===1) map.flyTo(bounds[0],14,{animate:true,duration:1});
    else map.fitBounds(bounds,{padding:[60,60],maxZoom:14,animate:true,duration:1});
  }
}

function highlightCard(id) {
  document.querySelectorAll('.pitem').forEach(el=>el.classList.remove('on'));
  const card = document.getElementById('card-'+id);
  if (card) { card.classList.add('on'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function clickPlace(id) {
  const info = markersByPlaceId[id];
  if (info) {
    map.flyTo(info.marker.getLatLng(),15,{animate:true,duration:1});
    setTimeout(()=>info.marker.openPopup(),1100);
  }
  highlightCard(id);
}

// ---- SIDEBAR RENDER ----
function renderDayTabs(days) {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '<button class="dtab on" id="dtab-all" onclick="selectDay(\'all\',-1)">All Days</button>'
    + days.map((d,i)=>'<button class="dtab" id="dtab-'+i+'" onclick="selectDay('+i+','+i+')" style="">D'+(i+1)+'</button>').join('');
}

function selectDay(key, idx) {
  activeDay = key;
  document.querySelectorAll('.dtab').forEach(b=>{
    b.classList.remove('on');
    b.style.background='';b.style.borderColor='';b.style.color='';
  });
  const activeBtn = document.getElementById('dtab-'+key);
  if (activeBtn) {
    activeBtn.classList.add('on');
    if (idx >= 0) {
      const col = dayColor(idx);
      activeBtn.style.background=col;activeBtn.style.borderColor=col;activeBtn.style.color='#fff';
    } else {
      activeBtn.style.background='var(--blue)';activeBtn.style.borderColor='var(--blue)';activeBtn.style.color='#fff';
    }
  }

  if (key==='all') {
    renderAllDays(tripData.days);
    showAllMarkers(tripData.days);
    drawRoutes(tripData.days);
  } else {
    const day = tripData.days[idx];
    renderDay(day, idx);
    showDayMarkers(day, idx);
    routesLayer.clearLayers();
  }
}

function renderDay(day, di) {
  const col = dayColor(di);
  const t = day.transport;
  const canEdit = myRole !== 'viewer';
  const showCurrency = rateAvailable ? displayCurrency : baseCurrency;
  let html = '';

  if (t && t.from) {
    const tIcon = TRANSPORT_ICONS[t.mode]||'🚌';
    const tCostText = WanderCurrency.formatCost(t.estimatedCost, baseCurrency, showCurrency, currentRate) || 'set cost';
    html += '<div class="tcard"><div class="tcard-route">'+tIcon+' '
      +(canEdit?'<span class="editable" data-edit="transport|from">'+t.from+'</span>':t.from)+' → '
      +(canEdit?'<span class="editable" data-edit="transport|to">'+t.to+'</span>':t.to)+'</div>'
      +'<div class="tcard-meta">'
      +'<span>⏱ '+(canEdit?'<span class="editable" data-edit="transport|duration">'+(t.duration||'set duration')+'</span>':(t.duration||''))+'</span>'
      +'<span>💰 '+(canEdit?'<span class="editable" data-edit="transport|estimatedCost">'+tCostText+'</span>':tCostText)+'</span>'
      +'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-top:5px;font-style:italic'+(canEdit?'" class="editable" data-edit="transport|notes':'')+'">'+(t.notes||(canEdit?'Add notes…':''))+'</div>'
      +(t.bookingUrl?'<a href="'+t.bookingUrl+'" target="_blank" style="font-size:12px;color:var(--blue);font-weight:600">Book '+t.mode+' →</a>':'')
      +'</div>';
  }

  html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:'+col+';margin-bottom:4px">'
    +'Day '+(di+1)+' · '+(day.city||'')+', '+(day.country||'')+'</div>';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:10px'+(canEdit?'" class="editable" data-edit="day|title':'')+'">'
    +(day.title || (canEdit?'Add a theme for this day…':''))+'</div>';

  (day.places||[]).forEach(p => {
    const pIcon = CAT_ICONS[p.category]||CAT_ICONS.default;
    const pCostText = WanderCurrency.formatCost(p.cost, baseCurrency, showCurrency, currentRate) || (canEdit ? 'Set cost' : '');
    html += '<div class="pitem" id="card-'+p.id+'" onclick="clickPlace(\''+p.id+'\')">'
      +(canEdit?'<span class="pitem-remove" data-pid="'+p.id+'">✕</span>':'')
      +'<div class="pitem-hdr"><div class="pitem-ico">'+pIcon+'</div>'
      +'<div><div class="pitem-name'+(canEdit?' editable" data-edit="place|'+p.id+'|name':'')+'">'+p.name+'</div>'
      +'<div class="pitem-time">'
      +(canEdit?'<span class="editable" data-edit="place|'+p.id+'|timeOfDay">'+p.timeOfDay+'</span>':p.timeOfDay)
      +' · '
      +(canEdit?'<span class="editable" data-edit="place|'+p.id+'|duration">'+p.duration+'</span>':p.duration)
      +'</div></div></div>'
      +'<div class="pitem-desc'+(canEdit?' editable" data-edit="place|'+p.id+'|description':'')+'">'
      +(canEdit ? (p.description||'Add a description…') : (p.description||'').substring(0,100)+'…')+'</div>'
      +'<div class="pitem-tags">'
      +(pCostText?'<span class="badge badge-blue'+(canEdit?' editable" data-edit="place|'+p.id+'|cost':'')+'">'+pCostText+'</span>':'')
      +(p.bookingRequired?'<span class="badge badge-amber">🎟 Book ahead</span>':'')
      +(p.babyFriendly===true?'<span class="badge badge-green">👶 Baby ok</span>':'')
      +(p.babyFriendly===false?'<span class="badge badge-red">⚠ Carrier</span>':'')
      +'</div>'
      +(p.bookingUrl?'<a href="'+p.bookingUrl+'" target="_blank" class="btn btn-primary btn-sm" style="margin-top:8px;font-size:12px" onclick="event.stopPropagation()">Book →</a>':'')
      +'</div>';
  });

  if (canEdit) html += '<button class="dashed-add-btn" id="addPlaceBtn">+ Add place</button>';

  document.getElementById('sbBody').innerHTML = html;
  if (canEdit) attachEditHandlers(di);
}

function renderAllDays(days) {
  const itin = tripData;
  const showCurrency = rateAvailable ? displayCurrency : baseCurrency;
  let html = '';

  if (itin.urgentBookings && itin.urgentBookings.length) {
    html += '<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px;margin-bottom:14px">'
      +'<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:8px">🚨 Book these first</div>';
    itin.urgentBookings.forEach(u => {
      html += '<div style="font-size:13px;margin-bottom:6px"><strong>'+u.what+'</strong> '
        +'<span style="color:var(--muted);font-size:12px">— '+u.when+'</span>'
        +(u.url?'<br><a href="'+u.url+'" target="_blank" style="font-size:12px;color:var(--blue)">Book here →</a>':'')+'</div>';
    });
    html += '</div>';
  }

  if (itin.budgetEstimate) {
    const b = itin.budgetEstimate;
    html += '<div style="background:var(--blue-l);border:1px solid #BFDBFE;border-radius:8px;padding:12px;margin-bottom:14px">'
      +'<div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px">💰 Budget estimate</div>'
      +Object.entries(b).map(([k,v])=>'<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #BFDBFE"><span>'+k.charAt(0).toUpperCase()+k.slice(1)+'</span><span style="font-weight:600">'+WanderCurrency.formatCost(v, baseCurrency, showCurrency, currentRate)+'</span></div>').join('')
      +'</div>';
  }

  days.forEach((day,di) => {
    const col = dayColor(di);
    html += '<div style="margin-bottom:6px">'
      +'<div style="font-size:12px;font-weight:700;color:'+col+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px;cursor:pointer" onclick="selectDay('+di+','+di+')">'
      +'<span style="width:22px;height:22px;border-radius:50%;background:'+col+';color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px">'+(di+1)+'</span>'
      +' Day '+(di+1)+' · '+(day.city||'')+' <span style="color:var(--muted);font-weight:400;text-transform:none;font-size:11px">— '+(day.title||'')+'</span>'
      +'</div>';
    (day.places||[]).slice(0,3).forEach(p => {
      const pIcon = CAT_ICONS[p.category]||CAT_ICONS.default;
      const pCostText = (p.cost && !p.cost.free) ? WanderCurrency.formatCost(p.cost, baseCurrency, showCurrency, currentRate) : '';
      html += '<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer" onclick="clickPlace(\''+p.id+'\')">'
        +'<span>'+pIcon+'</span><span>'+p.name+'</span>'
        +(pCostText?'<span style="margin-left:auto;font-size:12px;color:var(--muted)">'+pCostText+'</span>':'')
        +'</div>';
    });
    if ((day.places||[]).length > 3) {
      html += '<div style="font-size:12px;color:var(--blue);padding:5px 0;cursor:pointer" onclick="selectDay('+di+','+di+')">+ '+((day.places.length-3))+' more → see full day</div>';
    }
    html += '</div>';
  });

  document.getElementById('sbBody').innerHTML = html;
}

// ---- INLINE EDITING (editor/owner only) ----
function attachEditHandlers(di) {
  document.querySelectorAll('#sbBody [data-edit]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); beginInlineEdit(el, di); });
  });
  document.querySelectorAll('#sbBody .pitem-remove').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); removePlace(di, el.dataset.pid); });
  });
  const addBtn = document.getElementById('addPlaceBtn');
  if (addBtn) addBtn.addEventListener('click', () => addPlace(di));
}

function beginInlineEdit(el, di) {
  const [kind, a, b] = el.dataset.edit.split('|');
  let getVal, setVal, multiline = false, isCost = false;

  if (kind === 'day') {
    getVal = () => tripData.days[di].title || '';
    setVal = v => { tripData.days[di].title = v; };
  } else if (kind === 'transport' && a === 'estimatedCost') {
    isCost = true;
    getVal = () => WanderCurrency.formatPlain(tripData.days[di].transport && tripData.days[di].transport.estimatedCost);
    setVal = v => {
      tripData.days[di].transport = tripData.days[di].transport || {};
      const prevUnit = (tripData.days[di].transport.estimatedCost && tripData.days[di].transport.estimatedCost.unit) || '';
      tripData.days[di].transport.estimatedCost = Object.assign(WanderCurrency.parseCostInput(v), { unit: prevUnit });
    };
  } else if (kind === 'transport') {
    const field = a;
    getVal = () => (tripData.days[di].transport && tripData.days[di].transport[field]) || '';
    setVal = v => { tripData.days[di].transport = tripData.days[di].transport || {}; tripData.days[di].transport[field] = v; };
  } else if (kind === 'place' && b === 'cost') {
    isCost = true;
    const pid = a;
    const place = (tripData.days[di].places || []).find(p => p.id === pid);
    getVal = () => WanderCurrency.formatPlain(place && place.cost);
    setVal = v => {
      if (!place) return;
      const prevUnit = (place.cost && place.cost.unit) || '';
      place.cost = Object.assign(WanderCurrency.parseCostInput(v), { unit: prevUnit });
    };
  } else if (kind === 'place') {
    const pid = a, field = b;
    const place = (tripData.days[di].places || []).find(p => p.id === pid);
    getVal = () => (place && place[field]) || '';
    setVal = v => { if (place) place[field] = v; };
    multiline = field === 'description';
  } else return;

  const current = getVal();
  const input = document.createElement(multiline ? 'textarea' : 'input');
  input.className = 'inline-input';
  input.value = current;
  if (isCost) input.placeholder = 'e.g. 400-800 or Free (in ' + baseCurrency + ')';
  if (multiline) input.rows = 2;
  el.replaceWith(input);
  input.focus();
  input.select();

  let done = false;
  const finish = (commit) => {
    if (done) return;
    done = true;
    const val = input.value.trim();
    if (commit && val !== current) { setVal(val); scheduleSave(); }
    renderDay(tripData.days[di], di);
  };
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !multiline) { e.preventDefault(); finish(true); }
    if (e.key === 'Escape') finish(false);
  });
}

function addPlace(di) {
  const day = tripData.days[di];
  day.places = day.places || [];
  const newId = 'custom-' + Date.now().toString(36);
  day.places.push({ id: newId, name: 'New place', category: 'attraction', timeOfDay: 'Morning', duration: '1 hour', description: '', cost: { min: 0, max: 0, free: true, unit: '' }, lat: 0, lng: 0 });
  scheduleSave();
  renderDay(day, di);
}

function removePlace(di, pid) {
  if (!confirm('Remove this place from the itinerary?')) return;
  const day = tripData.days[di];
  day.places = (day.places || []).filter(p => p.id !== pid);
  scheduleSave();
  renderDay(day, di);
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveTripEdit, 3000);
}

async function saveTripEdit() {
  if (myRole === 'viewer') return;
  markSelfWrite();
  const { error } = await sb.from('trips').update({ itinerary: tripData }).eq('id', tripId);
  if (error) { console.error('Save failed', error); return; }
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  fetch('/api/notify-collaborators', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
    body: JSON.stringify({ tripId, changeType: 'itinerary_edit' })
  }).catch(() => {});
}

// ---- CURRENCY ----
// baseCurrency = what the itinerary's numbers are actually denominated in (set at
// generation time). displayCurrency = what's currently shown, converted live via
// currentRate. Both are always editable, and the choice persists for the owner/editors.
function renderCurrencyBar() {
  const el = document.getElementById('currencyBar');
  const opts = WanderCurrency.SUPPORTED.map(c => '<option value="' + c + '">' + c + '</option>').join('');
  el.innerHTML =
      '<div class="cur-row"><span title="Prices shown in">💱 Showing in</span>'
    + '<select id="curDisplay" class="cur-select">' + opts + '</select>'
    + '<button type="button" id="curDestBtn" class="cur-quick"></button>'
    + '</div>'
    + '<div class="cur-row cur-sub"><span>Priced in</span>'
    + '<select id="curBase" class="cur-select">' + opts + '</select>'
    + '<span id="curRateInfo" class="cur-rate"></span>'
    + '</div>';
  document.getElementById('curDisplay').value = displayCurrency;
  document.getElementById('curBase').value = baseCurrency;
  document.getElementById('curDisplay').addEventListener('change', e => { displayCurrency = e.target.value; onCurrencyChange(); });
  document.getElementById('curBase').addEventListener('change', e => { baseCurrency = e.target.value; onCurrencyChange(); });
  document.getElementById('curDestBtn').addEventListener('click', () => {
    displayCurrency = (displayCurrency === destGuess) ? baseCurrency : destGuess;
    document.getElementById('curDisplay').value = displayCurrency;
    onCurrencyChange();
  });
  updateDestBtnLabel();
}

function updateDestBtnLabel() {
  const btn = document.getElementById('curDestBtn');
  if (!btn) return;
  if (destGuess === baseCurrency) { btn.style.display = 'none'; return; }
  btn.style.display = 'inline-flex';
  btn.textContent = displayCurrency === destGuess ? ('🏠 Show in ' + baseCurrency) : ('🌍 Show in ' + destGuess);
}

async function updateRate() {
  if (displayCurrency === baseCurrency) { currentRate = 1; rateAvailable = true; }
  else {
    const r = await WanderCurrency.getRate(baseCurrency, displayCurrency);
    if (r) { currentRate = r; rateAvailable = true; }
    else { rateAvailable = false; }
  }
  const rateEl = document.getElementById('curRateInfo');
  if (!rateEl) return;
  if (displayCurrency === baseCurrency) rateEl.textContent = '';
  else if (!rateAvailable) rateEl.textContent = 'Rate unavailable — showing ' + baseCurrency;
  else rateEl.textContent = '1 ' + baseCurrency + ' ≈ ' + currentRate.toFixed(2) + ' ' + displayCurrency;
}

async function onCurrencyChange() {
  await updateRate();
  updateDestBtnLabel();
  if (activeDay === 'all') renderAllDays(tripData.days || []);
  else renderDay(tripData.days[activeDay], activeDay);
  if (myRole === 'viewer') return; // display-only for viewers; RLS would block a persisted write anyway
  markSelfWrite();
  tripPreferences.currency = { origin: baseCurrency, display: displayCurrency };
  await sb.from('trips').update({ preferences: tripPreferences }).eq('id', tripId);
}

// ---- WEATHER ----
async function loadWeather(place, startDate, endDate) {
  const el = document.getElementById('weatherBar');
  if (!el) return;
  if (!startDate || !endDate) { el.innerHTML = ''; return; }
  el.innerHTML = '<span class="weather-badge">🌤 Checking typical weather…</span>';
  const w = await WanderWeather.getApprox(place, startDate, endDate);
  if (!w) { el.innerHTML = ''; return; }
  el.innerHTML = '<span class="weather-badge">🌡 ' + w.label + ' · ~' + w.avgLow + '°–' + w.avgHigh + '°C</span>'
    + '<span style="font-size:11px">' + w.tip + '</span>';
}

// ---- LIVE SYNC (other collaborators' edits) ----
// Postgres jsonb doesn't preserve object key order, so a round-tripped itinerary
// can fail a JSON.stringify equality check even when nothing actually changed —
// and the "preferences-only change" trigger skip means updated_by isn't reliable
// either. So explicitly mark our own writes and ignore the realtime echo they
// produce for a few seconds, rather than trying to infer it after the fact.
let ignoreEchoUntil = 0;
function markSelfWrite() { ignoreEchoUntil = Date.now() + 4000; }

function subscribeTripChanges() {
  sb.channel('trip:' + tripId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'trips', filter: `id=eq.${tripId}` }, payload => {
      if (Date.now() < ignoreEchoUntil) return;
      if (JSON.stringify(payload.new.itinerary) === JSON.stringify(tripData)) return; // preferences-only change (e.g. currency), not an itinerary edit
      tripData = payload.new.itinerary;
      if (activeDay === 'all') {
        renderAllDays(tripData.days || []);
        showAllMarkers(tripData.days || []);
        drawRoutes(tripData.days || []);
      } else {
        renderDay(tripData.days[activeDay], activeDay);
        showDayMarkers(tripData.days[activeDay], activeDay);
      }
      showSyncToast();
    })
    .subscribe();
}

function showSyncToast() {
  const el = document.getElementById('syncToast');
  el.textContent = '🔄 Updated by a collaborator · just now';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ---- SHARE MODAL ----
function openShareModal() {
  document.getElementById('shareModalOverlay').style.display = 'flex';
  loadCollaborators();
}
function closeShareModal() {
  document.getElementById('shareModalOverlay').style.display = 'none';
}

async function loadCollaborators() {
  const { data } = await sb.from('trip_collaborators').select('id,invited_email,role,status').eq('trip_id', tripId).order('created_at');
  renderCollaborators(data || []);
}

function renderCollaborators(list) {
  const box = document.getElementById('collabList');
  const isOwner = myRole === 'owner';
  if (!list.length) {
    box.innerHTML = '<p style="font-size:13px;color:var(--muted)">No one else has been invited yet.</p>';
  } else {
    box.innerHTML = list.map(c => '<div class="collab-row">'
      + '<div class="collab-email">' + c.invited_email + '</div>'
      + '<div class="collab-status">' + (c.status === 'pending' ? 'Invited · pending' : 'Joined') + '</div>'
      + '<div class="collab-actions">'
      + (isOwner
          ? '<select class="role-select" onchange="changeRole(\'' + c.id + '\', this.value)">'
            + '<option value="editor"' + (c.role === 'editor' ? ' selected' : '') + '>Editor</option>'
            + '<option value="viewer"' + (c.role === 'viewer' ? ' selected' : '') + '>Viewer</option>'
            + '</select>'
            + '<button class="btn btn-ghost btn-sm" onclick="removeCollaborator(\'' + c.id + '\')">Remove</button>'
          : '<span class="badge badge-blue">' + c.role + '</span>')
      + '</div></div>').join('');
  }
  document.getElementById('inviteFormWrap').style.display = isOwner ? 'block' : 'none';
}

async function changeRole(id, role) {
  await sb.from('trip_collaborators').update({ role }).eq('id', id);
  loadCollaborators();
}

async function removeCollaborator(id) {
  if (!confirm('Remove this collaborator?')) return;
  await sb.from('trip_collaborators').delete().eq('id', id);
  loadCollaborators();
}

async function submitInvite() {
  const emailInput = document.getElementById('inviteEmail');
  const roleInput = document.getElementById('inviteRole');
  const email = emailInput.value.trim().toLowerCase();
  if (!email) return;
  const btn = document.getElementById('inviteSendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { data: { session } } = await sb.auth.getSession();
  const { error } = await sb.from('trip_collaborators').upsert(
    { trip_id: tripId, invited_email: email, role: roleInput.value, invited_by: session.user.id },
    { onConflict: 'trip_id,invited_email' }
  );
  if (error) {
    alert('Could not invite: ' + error.message);
    btn.disabled = false; btn.textContent = 'Send invite';
    return;
  }
  await fetch('/api/invite-collaborator', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
    body: JSON.stringify({ tripId, collaboratorEmail: email })
  }).catch(() => {});

  emailInput.value = '';
  btn.disabled = false; btn.textContent = 'Send invite';
  loadCollaborators();
}

// ---- LOAD TRIP ----
async function loadTrip() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/'; return; }
  currentUserId = session.user.id;

  const params = new URLSearchParams(window.location.search);
  tripId = params.get('id');
  if (!tripId) { window.location.href = '/dashboard.html'; return; }

  const { data: trip, error } = await sb.from('trips').select('*').eq('id',tripId).single();
  if (error || !trip) { alert('Trip not found'); window.location.href = '/dashboard.html'; return; }

  if (trip.user_id === currentUserId) {
    myRole = 'owner';
  } else {
    const { data: collab } = await sb.from('trip_collaborators').select('role').eq('trip_id', tripId).eq('user_id', currentUserId).eq('status','accepted').maybeSingle();
    myRole = collab?.role || 'viewer';
  }
  document.getElementById('shareBtn').style.display = 'inline-flex';

  tripData = trip.itinerary;
  tripPreferences = trip.preferences || {};
  document.title = (tripData.title || trip.destination) + ' - WanderAI';
  document.getElementById('tripTitle').textContent = tripData.title || trip.destination;

  const days = tripData.days?.length || 0;
  const meta = [];
  if (trip.start_date) meta.push(new Date(trip.start_date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}));
  if (days) meta.push(days+' days');
  if (trip.travelers) meta.push(trip.travelers+' traveler'+(trip.travelers>1?'s':''));
  document.getElementById('tripMeta').textContent = meta.join(' · ');

  baseCurrency = tripData.currency || tripPreferences.currency?.origin || 'USD';
  displayCurrency = tripPreferences.currency?.display || baseCurrency;
  destGuess = WanderCurrency.guess(trip.destination);
  renderCurrencyBar();
  await updateRate();

  loadWeather(trip.destination, trip.start_date, trip.end_date);

  initMap();
  renderDayTabs(tripData.days||[]);
  renderAllDays(tripData.days||[]);
  showAllMarkers(tripData.days||[]);
  drawRoutes(tripData.days||[]);

  // Active all-tab
  const allTab = document.getElementById('dtab-all');
  if (allTab) { allTab.style.background='var(--blue)';allTab.style.borderColor='var(--blue)';allTab.style.color='#fff'; }

  subscribeTripChanges();
}

loadTrip();
</script>
