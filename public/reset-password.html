<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password - WanderAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-em">✈️</div>
      <h1>WanderAI</h1>
      <p>Set a new password</p>
    </div>

    <div id="authError" class="alert alert-err" style="display:none"></div>
    <div id="authOk" class="alert alert-ok" style="display:none"></div>

    <div id="checkingState" style="text-align:center;padding:20px 0">
      <span class="spinner spinner-blue" style="width:28px;height:28px;border-width:3px"></span>
      <p style="color:var(--muted);font-size:13px;margin-top:12px">Verifying your reset link…</p>
    </div>

    <div id="invalidState" style="display:none;text-align:center">
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px">This reset link is invalid or has expired.</p>
      <a href="/" class="btn btn-primary btn-full btn-lg">← Back to home</a>
    </div>

    <div id="resetForm" style="display:none">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" id="newPass" class="form-input" placeholder="8+ characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input type="password" id="newPassConfirm" class="form-input" placeholder="8+ characters" required>
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="doUpdatePassword()" id="resetBtn">Update password</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = window.SUPABASE_URL || 'https://yaqzlytfwvvcygwxzdhr.supabase.co';
const SUPABASE_ANON = window.SUPABASE_ANON || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhcXpseXRmd3Z2Y3lnd3h6ZGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2Nzc5NzUsImV4cCI6MjA5OTI1Mzk3NX0.lQyAFpD0NbEnDpUkDrIabJ7e1aaO3gA9Kzyxq0MQmCg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function showErr(msg) {
  const el = document.getElementById('authError');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'flex';
}
function showOk(msg) {
  const el = document.getElementById('authOk');
  el.textContent = '✓ ' + msg;
  el.style.display = 'flex';
}

function showResetForm() {
  document.getElementById('checkingState').style.display = 'none';
  document.getElementById('invalidState').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
}

async function doUpdatePassword() {
  const pass = document.getElementById('newPass').value;
  const confirm = document.getElementById('newPassConfirm').value;
  if (pass.length < 8) return showErr('Password must be at least 8 characters.');
  if (pass !== confirm) return showErr('Passwords do not match.');

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Updating…';
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) {
    showErr(error.message);
    btn.disabled = false;
    btn.textContent = 'Update password';
    return;
  }
  showOk('Password updated! Redirecting…');
  document.getElementById('resetForm').style.display = 'none';
  setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
}

// Supabase fires this once it's parsed the recovery token from the URL.
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' && session) showResetForm();
});

// Fallback: if a recovery session is already established by the time we check
// (e.g. listener attached after the event fired), show the form anyway.
(async () => {
  await new Promise(r => setTimeout(r, 1200));
  if (document.getElementById('resetForm').style.display !== 'none') return;
  const { data: { session } } = await sb.auth.getSession();
  if (session) showResetForm();
  else {
    document.getElementById('checkingState').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }
})();
</script>
</body>
</html>
